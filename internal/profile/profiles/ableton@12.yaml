schema_version: 1
id: ableton@12
display_name: "Ableton Live 12"
markers:
  file_suffixes: [".als"]
  expected_dirs: ["Backup"]
ignore: |
  Backup/
  *.asd
  .DS_Store
  *.peak
  *.reapeaks
  .Renders/
  Exports/
gitattributes: ""
doctor:
  rules:
    - id: ableton.backup_tracked
    - id: ableton.asd_tracked
      disabled: false
    - id: size.large_tracked_audio
      params:
        max_bytes: 10485760
    - id: git.missing
    - id: git.old
    - id: lfs.missing
    - id: lfs.not_installed
    - id: ableton.no_als
    - id: ableton.collected_samples_empty
    - id: lfs.pattern_mismatch
    - id: lock.invalid_json
    - id: lock.overlap
    - id: lock.expired
    - id: init.merge_conflict
