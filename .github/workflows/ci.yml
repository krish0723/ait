name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go.sum
      - name: Install git-lfs (optional; enables LFS integration-style tests)
        run: brew list git-lfs >/dev/null 2>&1 || brew install git-lfs
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
